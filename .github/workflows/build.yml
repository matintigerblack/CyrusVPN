name: 🏛️ Build Cyrus VPN APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Get dependencies
        run: flutter pub get

      - name: 🔍 Analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: 🏗️ Build APK (Release)
        run: flutter build apk --release --split-per-abi

      - name: 🏗️ Build APK (Universal)
        run: flutter build apk --release

      - name: 📤 Upload arm64 APK
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-vpn-arm64
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          retention-days: 30

      - name: 📤 Upload Universal APK
        uses: actions/upload-artifact@v4
        with:
          name: cyrus-vpn-universal
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

      - name: 🎉 Build Summary
        run: |
          echo "## ✅ Build Successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📱 Download APKs:" >> $GITHUB_STEP_SUMMARY
          echo "- **arm64-v8a**: Most Android phones (2016+) - recommended" >> $GITHUB_STEP_SUMMARY
          echo "- **Universal**: All devices" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh build/app/outputs/flutter-apk/*.apk
